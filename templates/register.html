{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">Create an Account</h2>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row g-3">
                            {% for field in form %}
                                <div class="col-md-{% if field.name in 'username,password,email,address' %}12{% else %}6{% endif %}">
                                    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                                    {{ field }}
                                    {% if field.errors %}
                                        <small class="text-danger">{{ field.errors.0 }}</small>
                                    {% endif %}
                                </div>
                            {% endfor %}
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100 py-3">Register Now</button>
                            </div>
                        </div>
                    </form>
                    <p class="text-center mt-4 mb-0">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
